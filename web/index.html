<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KGPBoard — Campus Notices & Events</title>
    <script>
      // Set the theme before first paint to avoid a flash of the wrong colors.
      (function () {
        try {
          var stored = localStorage.getItem("kgpboard-theme");
          // Default to light; only use the stored preference if set.
          document.documentElement.dataset.theme = stored || "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
